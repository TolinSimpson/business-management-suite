    <path d="M156 292 L256 232 L352 168" fill="none" stroke="#e7e9ee" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M374 154 L364 186 L340 150 Z" fill="#e7e9ee"/>
  </g>
</svg>
